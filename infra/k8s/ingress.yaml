apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: allgreen-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - fraud-api.allgreen.internal
        - fraud-dashboard.allgreen.internal
      secretName: allgreen-tls
  rules:
    # Backend API
    - host: fraud-api.allgreen.internal
      http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: allgreen-backend
                port:
                  number: 8000
          - path: /health
            pathType: Exact
            backend:
              service:
                name: allgreen-backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: allgreen-backend
                port:
                  number: 8000
    # Frontend dashboard (served by nginx or a separate service)
    - host: fraud-dashboard.allgreen.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: allgreen-frontend
                port:
                  number: 3000
