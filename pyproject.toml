[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["ml/notebooks", "backend/db/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "SIM"]
ignore = ["E501"]  # line-length handled by formatter; don't be noisy about it

[tool.ruff.lint.per-file-ignores]
# ML code conventionally uses X for feature matrices (PEP 8 mathematical exception).
"ml/**" = ["N806", "N803", "N812"]
"tests/ml/**" = ["N806"]
"tests/data_generator.py" = ["N806"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
# Not strict mode yet — we'll tighten this after phase 2 when the shape is stable.
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
